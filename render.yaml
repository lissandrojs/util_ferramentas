###############################################################
# render.yaml — Deploy em INSTÂNCIA ÚNICA
# URL: https://util-ferramentas.onrender.com
###############################################################

services:
  - type: web
    name: util-ferramentas
    runtime: node
    rootDir: gateway
    buildCommand: >
      pip install yt-dlp --break-system-packages &&
      cd ../apps/app1-dashboard && npm install && npm run build &&
      cd ../app2-urlshortener/client && npm install && npm run build &&
      cd ../app3-datamanager/client && npm install && npm run build &&
      cd ../../../apps/app4-videodownloader/client && npm install && npm run build &&
      cd ../app5-converter/client && npm install && npm run build &&
      cd ../app6-biolink/client && npm install && npm run build &&
      cd ../../gateway && npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://util-ferramentas.onrender.com
      - key: PIX_KEY
        sync: false
      - key: PIX_MERCHANT_NAME
        sync: false
      - key: PIX_MERCHANT_CITY
        sync: false
      - key: PIX_QR_IMAGE_URL
        sync: false
      - key: PRO_PLAN_PRICE_CENTS
        value: "2990"
      - key: SITE_URL
        value: https://util-ferramentas.onrender.com
      - key: SITE_NAME
        value: Util Ferramentas
      - key: GOOGLE_ADSENSE_ID
        sync: false
      - key: GOOGLE_SEARCH_CONSOLE
        sync: false
      - key: LOG_LEVEL
        value: info
